<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spoti</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #fff;
  font-family: monospace;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Layout ── */
header {
  border-bottom: 1px solid #333;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 32px;
}

header h1 {
  font-size: 20px;
  letter-spacing: 4px;
  font-weight: normal;
}

nav { display: flex; gap: 4px; }

nav button {
  background: none;
  border: 1px solid #333;
  color: #888;
  padding: 6px 14px;
  cursor: pointer;
  font-family: monospace;
  font-size: 13px;
  letter-spacing: 1px;
}

nav button:hover { border-color: #fff; color: #fff; }
nav button.active { border-color: #fff; color: #fff; background: #111; }

main { padding: 28px 24px; max-width: 900px; }

/* ── Panels ── */
.panel { display: none; }
.panel.active { display: block; }

.panel-title {
  font-size: 11px;
  letter-spacing: 3px;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 20px;
}

/* ── Form ── */
.form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

input, select {
  background: #000;
  border: 1px solid #333;
  color: #fff;
  padding: 7px 10px;
  font-family: monospace;
  font-size: 13px;
  outline: none;
  width: 200px;
}

input:focus, select:focus { border-color: #fff; }
input::placeholder { color: #444; }

select option { background: #111; }

button.action {
  background: #000;
  border: 1px solid #fff;
  color: #fff;
  padding: 7px 18px;
  cursor: pointer;
  font-family: monospace;
  font-size: 13px;
  letter-spacing: 1px;
}

button.action:hover { background: #fff; color: #000; }

button.danger {
  border-color: #555;
  color: #888;
  padding: 4px 10px;
  font-size: 12px;
}

button.danger:hover { border-color: #fff; color: #fff; background: #000; }

/* ── Status message ── */
#status {
  margin-top: 14px;
  font-size: 12px;
  color: #666;
  min-height: 18px;
}

/* ── Table ── */
.table-wrap { margin-top: 20px; }

table {
  width: 100%;
  border-collapse: collapse;
}

thead tr {
  border-bottom: 1px solid #333;
}

th {
  text-align: left;
  padding: 8px 10px;
  font-size: 11px;
  letter-spacing: 2px;
  color: #555;
  font-weight: normal;
  text-transform: uppercase;
}

td {
  padding: 9px 10px;
  border-bottom: 1px solid #111;
  color: #ccc;
  vertical-align: middle;
}

tr:hover td { background: #0a0a0a; color: #fff; }

.count {
  font-size: 11px;
  color: #444;
  margin-top: 12px;
}

/* ── Search bar ── */
.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
}

.search-row input { width: 320px; }

/* ── Empty ── */
.empty {
  padding: 40px 0;
  color: #333;
  font-size: 12px;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<header>
  <h1>SPOTI</h1>
  <nav>
    <button class="active" onclick="show('view')">VIEW</button>
    <button onclick="show('search')">SEARCH</button>
    <button onclick="show('add')">ADD</button>
    <button onclick="show('delete')">DELETE</button>
  </nav>
</header>

<main>

  <!-- ── VIEW ── -->
  <div class="panel active" id="panel-view">
    <div class="panel-title">All Songs</div>
    <div class="table-wrap" id="view-table"></div>
    <div class="count" id="view-count"></div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="panel" id="panel-search">
    <div class="panel-title">Search</div>
    <div class="search-row">
      <input id="search-input" type="text" placeholder="title, artist, genre, date..." oninput="doSearch()"/>
    </div>
    <div class="table-wrap" id="search-table"></div>
    <div class="count" id="search-count"></div>
  </div>

  <!-- ── ADD ── -->
  <div class="panel" id="panel-add">
    <div class="panel-title">Add Song</div>
    <div class="form-row">
      <input id="add-title"   type="text" placeholder="Title *"/>
      <input id="add-artist"  type="text" placeholder="Artist *"/>
    </div>
    <div class="form-row">
      <select id="add-genre">
        <option value="">— Genre —</option>
        <option>Pop</option>
        <option>Hip-Hop</option>
        <option>R&amp;B</option>
        <option>Rock</option>
        <option>Pop Rock</option>
        <option>Indie Pop</option>
        <option>Electropop</option>
        <option>K-Pop</option>
        <option>Folk</option>
        <option>Jazz</option>
        <option>Classical</option>
        <option>Electronic</option>
        <option>Country</option>
        <option>Other</option>
      </select>
      <input id="add-date" type="text" placeholder="Release date (YYYY-MM-DD)"/>
    </div>
    <div class="form-row">
      <button class="action" onclick="doAdd()">ADD SONG</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- ── DELETE ── -->
  <div class="panel" id="panel-delete">
    <div class="panel-title">Delete Song</div>
    <div class="form-row">
      <input id="del-id" type="number" placeholder="Song ID" style="width:120px"/>
      <button class="action" onclick="doDelete()">DELETE</button>
    </div>
    <div id="del-status"></div>
    <div class="table-wrap" id="delete-table"></div>
    <div class="count" id="delete-count"></div>
  </div>

</main>

<script>
const API = 'http://localhost:8080';

// ── Nav ────────────────────────────────────────────────────
function show(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => {
    if (b.textContent.trim().toLowerCase() === name) b.classList.add('active');
  });
  if (name === 'view')   loadView();
  if (name === 'delete') loadDeleteList();
}

// ── API ────────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/x-www-form-urlencoded';
    opts.body = body;
  }
  try {
    const res = await fetch(API + path, opts);
    if (res.status === 204) return { ok: true };
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    return { ok: false, data: { error: 'Cannot reach server. Is spoti-server running?' } };
  }
}

// ── Table builder ──────────────────────────────────────────
function buildTable(songs, showDelBtn) {
  if (!songs || !songs.length)
    return '<div class="empty">NO SONGS FOUND</div>';

  let html = `<table>
    <thead><tr>
      <th>ID</th><th>Title</th><th>Artist</th><th>Genre</th><th>Release Date</th>
      ${showDelBtn ? '<th></th>' : ''}
    </tr></thead><tbody>`;

  for (const s of songs) {
    html += `<tr>
      <td>${s.id}</td>
      <td>${esc(s.title)}</td>
      <td>${esc(s.artist)}</td>
      <td>${esc(s.genre)}</td>
      <td>${esc(s.release_date)}</td>
      ${showDelBtn ? `<td><button class="action danger" onclick="quickDelete(${s.id})">DEL</button></td>` : ''}
    </tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── VIEW ───────────────────────────────────────────────────
async function loadView() {
  const r = await apiFetch('GET', '/songs');
  if (!r.ok) { document.getElementById('view-table').innerHTML = '<div class="empty">ERROR: ' + esc(r.data.error) + '</div>'; return; }
  document.getElementById('view-table').innerHTML = buildTable(r.data, false);
  document.getElementById('view-count').textContent = r.data.length + ' songs';
}

// ── SEARCH ─────────────────────────────────────────────────
let searchTimer;
function doSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('search-input').value.trim();
    if (!q) {
      document.getElementById('search-table').innerHTML = '';
      document.getElementById('search-count').textContent = '';
      return;
    }
    const r = await apiFetch('GET', '/songs?q=' + encodeURIComponent(q));
    if (!r.ok) { document.getElementById('search-table').innerHTML = '<div class="empty">ERROR</div>'; return; }
    document.getElementById('search-table').innerHTML = buildTable(r.data, false);
    document.getElementById('search-count').textContent = r.data.length + ' result(s)';
  }, 250);
}

// ── ADD ────────────────────────────────────────────────────
async function doAdd() {
  const title  = document.getElementById('add-title').value.trim();
  const artist = document.getElementById('add-artist').value.trim();
  const genre  = document.getElementById('add-genre').value;
  const date   = document.getElementById('add-date').value.trim();
  const status = document.getElementById('status');

  if (!title)  { status.textContent = 'Title is required.'; return; }
  if (!artist) { status.textContent = 'Artist is required.'; return; }

  const body = new URLSearchParams({ title, artist, genre, release_date: date }).toString();
  const r = await apiFetch('POST', '/songs', body);

  if (!r.ok) {
    status.textContent = 'Error: ' + (r.data.error || 'unknown');
    return;
  }

  status.textContent = 'Added: [' + r.data.id + '] ' + r.data.title + ' — ' + r.data.artist;
  document.getElementById('add-title').value  = '';
  document.getElementById('add-artist').value = '';
  document.getElementById('add-genre').value  = '';
  document.getElementById('add-date').value   = '';
}

// ── DELETE ─────────────────────────────────────────────────
async function loadDeleteList() {
  const r = await apiFetch('GET', '/songs');
  if (!r.ok) return;
  document.getElementById('delete-table').innerHTML = buildTable(r.data, true);
  document.getElementById('delete-count').textContent = r.data.length + ' songs';
}

async function doDelete() {
  const id = document.getElementById('del-id').value.trim();
  const st = document.getElementById('del-status');
  if (!id) { st.textContent = 'Enter a song ID.'; return; }
  await deleteSong(parseInt(id), st);
  document.getElementById('del-id').value = '';
}

async function quickDelete(id) {
  await deleteSong(id, document.getElementById('del-status'));
}

async function deleteSong(id, statusEl) {
  const r = await apiFetch('DELETE', '/songs/' + id);
  if (!r.ok) {
    statusEl.textContent = 'Error: ' + ((r.data && r.data.error) || 'not found');
    return;
  }
  statusEl.textContent = 'Deleted song ID ' + id;
  loadDeleteList();
}

// ── Init ───────────────────────────────────────────────────
loadView();
</script>
</body>
</html>
